name: Flutter CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Analyze, test, web, and Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test with coverage
        run: flutter test --coverage

      - name: Build web
        run: flutter build web --dart-define-from-file=env/development.json

      - name: Build Android APK
        run: flutter build apk --release --dart-define-from-file=env/development.json

  desktop-smoke:
    name: Desktop smoke build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux desktop packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        if: runner.os == 'Linux'
        run: flutter build linux --release --dart-define-from-file=env/development.json

      - name: Build Windows
        if: runner.os == 'Windows'
        run: flutter build windows --release --dart-define-from-file=env/development.json

      - name: Build macOS
        if: runner.os == 'macOS'
        run: flutter build macos --release --dart-define-from-file=env/development.json

      - name: Build iOS without code signing
        if: runner.os == 'macOS'
        run: flutter build ios --release --no-codesign --dart-define-from-file=env/development.json
